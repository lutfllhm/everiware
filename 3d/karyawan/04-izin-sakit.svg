<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160"><style>
  .float{animation:float 3.2s ease-in-out infinite}
  .float2{animation:float 3.8s ease-in-out infinite}
  .float3{animation:float 4.2s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .spin-slow{transform-box:view-box;transform-origin:80px 70px;animation:spin 22s linear infinite}
  .hand-sec{transform-box:view-box;transform-origin:80px 72px;animation:spin 6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pulse{transform-box:fill-box;transform-origin:center;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.18);opacity:.85}}
  .bounce{animation:bounce 1.9s cubic-bezier(.5,.05,.3,1) infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-12px)}55%{transform:translateY(0)}70%{transform:translateY(-4px)}85%{transform:translateY(0)}}
  .nudge{animation:nudge 1.5s ease-in-out infinite}
  @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(7px)}}
  .slideout{animation:slideout 1.8s ease-in-out infinite}
  @keyframes slideout{0%{transform:translateX(0);opacity:.4}40%{opacity:1}100%{transform:translateX(12px);opacity:0}}
  .grow1{transform-box:fill-box;transform-origin:bottom;animation:grow 2.6s ease-in-out infinite}
  .grow2{transform-box:fill-box;transform-origin:bottom;animation:grow 2.6s ease-in-out infinite .25s}
  .grow3{transform-box:fill-box;transform-origin:bottom;animation:grow 2.6s ease-in-out infinite .5s}
  @keyframes grow{0%,100%{transform:scaleY(.78)}50%{transform:scaleY(1)}}
  .twinkle{transform-box:fill-box;transform-origin:center;animation:twinkle 2.2s ease-in-out infinite}
  .twinkle.b{animation-delay:.6s}.twinkle.c{animation-delay:1.1s}.twinkle.d{animation-delay:1.6s}
  @keyframes twinkle{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
  <defs>
    <radialGradient id="capW4" cx=".35" cy=".3" r=".9"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#dde4ef"/></radialGradient>
    <radialGradient id="capR4" cx=".35" cy=".3" r=".9"><stop offset="0" stop-color="#ff8a7d"/><stop offset="1" stop-color="#e23b30"/></radialGradient>
  </defs>
  <ellipse cx="80" cy="136" rx="42" ry="8" fill="#1f2a44" opacity=".16"/>
  <g class="float">
    <g transform="rotate(-32 80 76)">
      <rect x="38" y="58" width="84" height="40" rx="20" fill="url(#capW4)"/>
      <path d="M80 58 h22 a20 20 0 0 1 20 20 a20 20 0 0 1 -20 20 h-22 Z" fill="url(#capR4)"/>
      <rect x="38" y="58" width="84" height="40" rx="20" fill="none" stroke="#c9d2e0" stroke-opacity=".4" stroke-width="1.5"/>
      <ellipse cx="60" cy="68" rx="20" ry="6" fill="#fff" opacity=".7"/>
      <ellipse cx="104" cy="68" rx="12" ry="5" fill="#fff" opacity=".45"/>
    </g>
  </g>
</svg>
