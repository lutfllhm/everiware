<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="a2_rim" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#ffb259"/><stop offset="0.5" stop-color="#f5852f"/><stop offset="1" stop-color="#d35d14"/></radialGradient>
    <radialGradient id="a2_face" cx="0.4" cy="0.34" r="0.85"><stop offset="0" stop-color="#fff7ea"/><stop offset="1" stop-color="#ffe1b4"/></radialGradient>
    <radialGradient id="a2_chk" cx="0.35" cy="0.3" r="0.9"><stop offset="0" stop-color="#86f29a"/><stop offset="0.5" stop-color="#36c267"/><stop offset="1" stop-color="#1c9a4c"/></radialGradient>
    <filter id="a2_b" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  
  <style>
    .flt{animation:flt 3s ease-in-out infinite}
    .shd{transform-box:fill-box;transform-origin:center;animation:shd 3s ease-in-out infinite}
    .pulse{transform-box:fill-box;transform-origin:center;animation:pulse 1.9s ease-in-out infinite}
    .bob{animation:bob 2.6s ease-in-out infinite}
    .blink{animation:blink 1.6s ease-in-out infinite}
    @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes shd{0%,100%{transform:scaleX(1);opacity:.45}50%{transform:scaleX(.82);opacity:.3}}
    @keyframes pulse{0%{transform:scale(.6);opacity:0}55%{transform:scale(1.12);opacity:1}70%{transform:scale(1)}100%{transform:scale(1)}}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
  </style>

  <ellipse class="shd" cx="116" cy="200" rx="74" ry="14" fill="#b06a2a" filter="url(#a2_b)"/>
  <g class="flt" style="animation-delay:-1.1s">
    <circle cx="112" cy="110" r="78" fill="url(#a2_rim)"/>
    <circle cx="112" cy="110" r="59" fill="url(#a2_face)"/>
    <rect x="108" y="58" width="8" height="14" rx="4" fill="#caa06a"/>
    <rect x="108" y="148" width="8" height="14" rx="4" fill="#caa06a"/>
    <rect x="150" y="106" width="14" height="8" rx="4" fill="#caa06a"/>
    <rect x="60" y="106" width="14" height="8" rx="4" fill="#caa06a"/>
    <line x1="112" y1="110" x2="112" y2="78" stroke="#7a4a1e" stroke-width="8" stroke-linecap="round">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 112 110" to="360 112 110" dur="60s" repeatCount="indefinite"/>
    </line>
    <line x1="112" y1="110" x2="112" y2="84" stroke="#7a4a1e" stroke-width="8" stroke-linecap="round">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 112 110" to="360 112 110" dur="6s" repeatCount="indefinite"/>
    </line>
    <circle cx="112" cy="110" r="7" fill="#5e3614"/>
    <ellipse cx="86" cy="80" rx="26" ry="15" fill="#ffffff" opacity="0.32" transform="rotate(-28 86 80)"/>
    <g class="pulse">
      <circle cx="160" cy="162" r="36" fill="url(#a2_chk)"/>
      <ellipse cx="150" cy="148" rx="16" ry="10" fill="#ffffff" opacity="0.35"/>
      <path d="M145 162 l10 12 l20 -25" fill="none" stroke="#ffffff" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>