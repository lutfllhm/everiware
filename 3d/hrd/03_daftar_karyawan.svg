    <rect x="112" y="83" width="44" height="6" rx="3" fill="#cdd8e2"/>
    <rect x="112" y="94" width="30" height="5" rx="2.5" fill="#dfe7ee"/>
    <rect x="72" y="114" width="96" height="34" rx="9" fill="#ffffff" opacity="0.95"/>
