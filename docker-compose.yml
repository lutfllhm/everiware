version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: everiware_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_secure}
      MYSQL_DATABASE: ${DB_NAME:-iware_presence}
      MYSQL_USER: ${DB_USER:-iware_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-iware_password_secure}
    ports:
      # Expose only to localhost (port 3309 to avoid conflict with existing MySQL instances on port 3306)
      - "127.0.0.1:3309:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically initialize database schema on first run
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: everiware_backend
    restart: unless-stopped
    environment:
      - PORT=5005
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-iware_user}
      - DB_PASSWORD=${DB_PASSWORD:-iware_password_secure}
      - DB_NAME=${DB_NAME:-iware_presence}
      - JWT_SECRET=${JWT_SECRET:-iware_presence_super_secret_key_2024}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
      - WEB_URL=${WEB_URL}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-5242880}
      - AI_SERVICE_URL=http://ai-service:5006/verify
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: everiware_ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:5006:5006"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: everiware_frontend
    restart: unless-stopped
    ports:
      # Map to port 8088 on localhost to avoid conflict with other apps (e.g. iware-frontend on 8080)
      - "127.0.0.1:8088:80"
      # - "443:443" # Uncomment if configuring SSL/HTTPS directly in Nginx
    depends_on:
      - backend

volumes:
  db_data:
    driver: local
  backend_uploads:
    driver: local
