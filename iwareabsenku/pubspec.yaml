name: iware_absenku
description: IWA - Aplikasi Absensi Digital
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State Management
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2

  # Camera & Location
  camera: ^0.10.5+9
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  image_picker: ^1.0.7

  # Face Detection (ML Kit — lokal, tanpa internet)
  google_mlkit_face_detection: ^0.11.0
  flutter_litert: ^0.1.2
  image: ^4.1.3

  # Auth
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  path_provider: ^2.1.2
  url_launcher: ^6.2.4
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.0.0
  uuid: ^4.4.0
  full_svg_flutter: 1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "assets/images/bg-apk.png"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/mobilefacenet.tflite
  fonts:
    - family: Usuzi
      fonts:
        - asset: assets/fonts/usuzicondital.ttf
